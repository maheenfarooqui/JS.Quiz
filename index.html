<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="login-card text-center">
                <div class="mb-4">
                    <i class="fa-solid fa-graduation-cap fa-3x"></i>
                </div>
                <h2 class="fw-bold mb-2">Welcome Back!</h2>
                <p class="text-muted mb-4">Enter your details to start the quiz</p>
                
                <div class="text-start">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Full Name</label>
                        <input type="text" id="userName" class="form-control" placeholder="e.g. Maheen Zuhra">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Roll Number</label>
                        <input type="password" id="rollNo" class="form-control" placeholder="e.g. 12345">
                    </div>
                    <button class="btn btn-primary w-100" onclick="startQuiz()">Start Quiz <i class="fa-solid fa-arrow-right ms-2"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>
</body>
</html>
